<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafe LP</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <div class="container">
      <h1>
        <a href="index.html">
          retro coffee
        </a>
      </h1>
      <nav class="nav">
        <ul>
          <li><a href="#about">About</a></li>
          <li><a href="#menu">Menu</a></li>
          <li><a href="#access">Access</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="fv">
    <div class="container">
      <h2>Tasty coffee</h2>
    </div>
  </section>

  <section class="section about" id="about">
    <div class="container">
      <h2>About</h2>
      <div class="about-area">
        <div class="about_txt">
          <p class="jp">おいしいコーヒーをご提供します。</p>
        </div>
        <div class="about_img">
          <img src="images/about.png">
        </div>
      </div>
    </div>
  </section>


  <section class="section gallery">
    <div class="container">
      <h2>Gallery</h2>
      <div class="gallery-grid">
        <img src="images/gallery1.jpg">
        <img src="images/gallery2.jpg">
        <img src="images/gallery4.jpg">
        <img src="images/gallery3.jpg">
      </div>
    </div>
  </section>


  <section class="section menu" id="menu">
    <div class="container">
      <h2>Menu</h2>
      <div class="menu-grid">
        <div class="menu-item">
          <img src="images/menu1.jpg">
          <h3>エスプレッソ</h3>
          <p>¥300</p>
        </div>

        <div class="menu-item">
          <img src="images/menu2.jpg">
          <h3>カフェラテ</h3>
          <p>¥450</p>
        </div>

        <div class="menu-item">
          <img src="images/menu3.jpg">
          <h3>カフェモカ</h3>
          <p>¥480</p>
        </div>
      </div>
    </div>
  </section>

  <section class="section concept">
    <div class="container">
      <h2>Concept</h2>
      <p class="jp">くつろげる空間を提供します。</p>
    </div>
  </section>

  <section class="section access" id="access">
    <div class="container">
      <h2>Access</h2>
      <div class="access-area">
        <div class="access-txt">
          <p class="jp">東京都〇〇</p>
        </div>
        <div class="access-map">
          <img src="images/access_map.jpg">
      </div>
    </div>
  </section>


  <section class="section cta">
    <div class="container">
      <h2>お気軽にご来店ください</h2>
      <p class="jp">おいしいコーヒーをご用意して<br class="sp-br">お待ちしています。</p>
      <a class="cta-button jp" href="#">お問い合わせ</a>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>© retolo coffee</p>
    </div>
  </footer>

</body>
</html>
